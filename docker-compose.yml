# =============================================================================
# Published URLs from host (default port mapping) - SERVER ONLY
# -----------------------------------------------------------------------------
#   db (MySQL)       localhost:3307   -> container :3306
#   server (API)     http://localhost:8000   (Flask + Socket.IO + /apidocs)
#   admin-ui         http://localhost:3001
#   swagger-ui       http://localhost:8081
# =============================================================================

services:
  compose-banner:
    image: alpine:3.20
    container_name: vending-compose-banner
    restart: "no"
    command:
      - /bin/sh
      - -lc
      - |
        printf '\n'
        printf '=============================================================================\n'
        printf ' Published URLs from host (default port mapping) - SERVER ONLY\n'
        printf '-----------------------------------------------------------------------------\n'
        printf ' db (MySQL)     localhost:3307  -> container :3306\n'
        printf ' server (API)   http://localhost:8000  (Flask + Socket.IO + /apidocs)\n'
        printf ' admin-ui       http://localhost:3001\n'
        printf ' machine-ui     http://localhost:3000  (Template for all machines)\n'
        printf ' swagger-ui     http://localhost:8081\n'
        printf '=============================================================================\n'
        printf ' To start a machine, use: cd client && ./run-machine.ps1 <index>\n'
        printf '=============================================================================\n'
        printf '\n'

  db:
    image: mysql:8
    container_name: vending-db
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=vending
      - TZ=Asia/Bangkok
    volumes:
      - db_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "3307:3306"
    healthcheck:
      test:
        ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 20s

  server:
    build: ./server
    volumes:
      - ./web/web-ui/build:/app/web-build
      - ./swagger.yaml:/app/swagger.yaml
    container_name: vending-server
    env_file:
      - .env
    environment:
      - SOCKETIO_ENABLED=1
      - DISPATCH_MODE=socket
      - TZ=Asia/Bangkok
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:3001,http://localhost:3002,http://localhost:3003,http://localhost:8081,http://192.168.1.44:3000,http://192.168.1.44:3001}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      db:
        condition: service_healthy

  admin-ui:
    build:
      context: ./web/admin-ui
      args:
        - NEXT_PUBLIC_ADMIN_API_URL=${NEXT_PUBLIC_ADMIN_API_URL:-http://localhost:8000}
    environment:
      - TZ=Asia/Bangkok
      - DOCKER_PUBLISHED_PORT=3001
      - DOCKER_HOST_URL=http://localhost:3001
    container_name: vending-admin-ui
    ports:
      - "3001:3000"
    depends_on:
      - server

  machine-ui:
    build:
      context: ./web/machine-ui
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        - NEXT_PUBLIC_OMISE_PUBLIC_KEY=${NEXT_PUBLIC_OMISE_PUBLIC_KEY}
    container_name: vending-machine-ui
    environment:
      - TZ=Asia/Bangkok
    ports:
      - "3000:3000"
    depends_on:
      - server

  swagger-ui:
    image: swaggerapi/swagger-ui:v5.32.1
    container_name: vending-swagger-ui
    ports:
      - "8081:8080"
    environment:
      URL: /openapi.yaml
    volumes:
      - ./swagger.yaml:/usr/share/nginx/html/openapi.yaml:ro
    depends_on:
      - server
    command:
      - /bin/sh
      - -c
      - |
        printf '\n=== vending-swagger-ui ===\n'
        printf '  Host browser:  http://localhost:8081\n'
        exec /docker-entrypoint.sh nginx -g 'daemon off;'

volumes:
  db_data:

