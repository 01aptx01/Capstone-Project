# =============================================================================
# Published URLs from host (default port mapping)
# -----------------------------------------------------------------------------
#   db (MySQL)       localhost:3307   -> container :3306
#   server (API)     http://localhost:8000   (Flask + Socket.IO + /apidocs)
#   client (agent)   http://localhost:5000
#   machine-ui       http://localhost:3000
#   admin-ui         http://localhost:3001
#   swagger-ui       http://localhost:8081  (host; avoids Jenkins on 8080)
# =============================================================================

services:
  db:
    image: mysql:8
    container_name: vending-db
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: vending
      TZ: Asia/Bangkok
    volumes:
      - db_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "3307:3306"
    healthcheck:
      test:
        ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 20s

  server:
    build: ./server
    volumes:
      - ./web/web-ui/build:/app/web-build
      - ./swagger.yaml:/app/swagger.yaml
    container_name: vending-server
    env_file:
      - .env
    environment:
      - AGENT_URL=http://client:5000/dispense
      - AGENT_BASE_URL=http://client:5000
      - SOCKETIO_ENABLED=1
      - DISPATCH_MODE=socket
      - TZ=Asia/Bangkok
      - CORS_ORIGINS=http://localhost:3000,http://localhost:3001,http://localhost:8081,http://machine-ui:3000,http://admin-ui:3000
      - DOCKER_URL_SERVER=http://localhost:8000
      - DOCKER_URL_MACHINE_UI=http://localhost:3000
      - DOCKER_URL_ADMIN_UI=http://localhost:3001
      - DOCKER_URL_SWAGGER=http://localhost:8081
      - DOCKER_URL_AGENT=http://localhost:5000
      - DOCKER_URL_DB=mysql://localhost:3307
      - DOCKER_PUBLISHED_PORT_SERVER=8000
      # Set OMISE_WEBHOOK_SECRET to your Omise webhook signing secret for production security
      # - OMISE_WEBHOOK_SECRET=your_webhook_secret_here
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      db:
        condition: service_healthy

  client:
    build: ./client/agent
    container_name: vending-pi
    ports:
      - "5000:5000"
    volumes:
      - agent_data:/data
    environment:
      - EVENT_SINK_MODE=socket
      - SERVER_SOCKET_URL=http://server:8000
      - MACHINE_ID=${MACHINE_ID:-MP1-001}
      - MACHINE_SECRET_KEY=${MACHINE_SECRET_KEY:-}
      - AGENT_DB_PATH=/data/agent.db
      - EVENT_SINK_URL=http://server:8000/api/machines/events
      - TZ=Asia/Bangkok
      - DOCKER_URL_AGENT=http://localhost:5000
      - DOCKER_URL_SERVER=http://localhost:8000
      - DOCKER_PUBLISHED_PORT_AGENT=5000

  machine-ui:
    build:
      context: ./web/machine-ui
      args:
        - NEXT_PUBLIC_OMISE_PUBLIC_KEY=${NEXT_PUBLIC_OMISE_PUBLIC_KEY}
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        - NEXT_PUBLIC_AGENT_BASE_URL=${NEXT_PUBLIC_AGENT_BASE_URL:-}
    environment:
      - TZ=Asia/Bangkok
      - DOCKER_PUBLISHED_PORT=3000
      - DOCKER_HOST_URL=http://localhost:3000
    container_name: vending-machine-ui
    ports:
      - "3000:3000"
    depends_on:
      - server

  admin-ui:
    build:
      context: ./web/admin-ui
      args:
        - NEXT_PUBLIC_ADMIN_API_URL=${NEXT_PUBLIC_ADMIN_API_URL:-http://localhost:8000}
    environment:
      - TZ=Asia/Bangkok
      - DOCKER_PUBLISHED_PORT=3001
      - DOCKER_HOST_URL=http://localhost:3001
    container_name: vending-admin-ui
    ports:
      - "3001:3000"
    depends_on:
      - server

  swagger-ui:
    image: swaggerapi/swagger-ui:v5.17.14
    container_name: vending-swagger-ui
    ports:
      - "8081:8080"
    environment:
      URL: /openapi.yaml
    volumes:
      - ./swagger.yaml:/usr/share/nginx/html/openapi.yaml:ro
    depends_on:
      - server
    command:
      - /bin/sh
      - -c
      - |
        printf '\n=== vending-swagger-ui ===\n'
        printf '  Host browser:  http://localhost:8081\n'
        printf '  Local (in container):   http://127.0.0.1:8080\n'
        printf '  Network (listen):       http://0.0.0.0:8080\n\n'
        exec /docker-entrypoint.sh nginx -g 'daemon off;'

volumes:
  db_data:
  agent_data:
