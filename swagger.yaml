swagger: "2.0"
info:
  title: "Smart Vending System API"
  description: "Advanced API for managing a smart vending machine, including payments, inventory, and health monitoring."
  version: "1.2.0"

host: "localhost:8000"
basePath: "/"
schemes:
  - "http"

definitions:
  Product:
    type: "object"
    properties:
      product_id:
        type: "integer"
      name:
        type: "string"
      description:
        type: "string"
      price:
        type: "number"
      stock:
        type: "integer"
      image_url:
        type: "string"
      heating_time:
        type: "integer"
  
  CartItem:
    type: "object"
    properties:
      product_id:
        type: "integer"
      quantity:
        type: "integer"

paths:
  /api/health:
    get:
      tags:
        - "System"
      summary: "Comprehensive system health check"
      description: "Checks connectivity to MySQL, Omise API, and Hardware Agent."
      responses:
        200:
          description: "All systems operational"
        207:
          description: "One or more systems degraded"
        500:
          description: "Internal server error"

  /api/products:
    get:
      tags:
        - "Inventory"
      summary: "List available products"
      parameters:
        - name: "machine_code"
          in: "query"
          description: "Specific machine identifier"
          required: false
          type: "string"
          default: "MP1-001"
      responses:
        200:
          description: "List of products"
          schema:
            type: "array"
            items:
              $ref: "#/definitions/Product"

  /api/buy/checkout:
    post:
      tags:
        - "Payments"
      summary: "Initiate purchase flow"
      description: "Validates stock and creates an Omise charge (Token or Source)."
      parameters:
        - in: "body"
          name: "body"
          required: true
          schema:
            type: "object"
            required:
              - "payment_id"
              - "payment_type"
              - "amount"
              - "cart"
            properties:
              payment_id:
                type: "string"
                example: "tok_test_..."
              payment_type:
                type: "string"
                enum: ["token", "source"]
              amount:
                type: "number"
                example: 1000
              cart:
                type: "array"
                items:
                  $ref: "#/definitions/CartItem"
              machine_code:
                type: "string"
                example: "MP1-001"
      responses:
        200:
          description: "Charge created successfully (OK or PENDING)"
        400:
          description: "Out of stock or payment failure"

  /api/buy/status/{charge_id}:
    get:
      tags:
        - "Payments"
      summary: "Poll payment status"
      parameters:
        - name: "charge_id"
          in: "path"
          required: true
          type: "string"
      responses:
        200:
          description: "Current status of the charge"
          schema:
            type: "object"
            properties:
              status:
                type: "string"
                example: "PAID"

  /api/buy/mock-pay:
    post:
      tags:
        - "Development"
      summary: "Bypass payment (Dev only)"
      description: "Forcefully marks a charge as PAID to trigger dispense."
      parameters:
        - in: "body"
          name: "body"
          required: true
          schema:
            type: "object"
            properties:
              charge_id:
                type: "string"
      responses:
        200:
          description: "Payment bypassed successfully"

  /api/buy/omise-webhook:
    post:
      tags:
        - "Payments"
      summary: "Omise Webhook Listener"
      description: "Handles asynchronous payment confirmations from Omise."
      responses:
        200:
          description: "Webhook processed"
